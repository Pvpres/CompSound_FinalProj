<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel REPL</title>
    <script src="https://unpkg.com/@strudel/repl@1.0.0"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            background-color: #121212;
            color: white;
        }
        strudel-editor {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <strudel-editor id="repl"></strudel-editor>
    
    <script>
        window.addEventListener('message', (event) => {
            console.log("Strudel REPL received message:", event.data);
            if (!event.data) return;
            
            let code = event.data;
            if (typeof code !== 'string') {
                if (code.code && typeof code.code === 'string') code = code.code;
                else return; 
            }
            
            const repl = document.getElementById('repl');
            if (repl) {
                console.log("Found repl element. Applying code...");
                
                // Method 1: The standard Web Component attribute way
                repl.setAttribute('code', code);
                
                // Method 2: Direct methods on the element
                if (typeof repl.evaluate === 'function') repl.evaluate();
                else if (typeof repl.start === 'function') repl.start();
                
                // Method 3: The underlying editor instance
                if (repl.editor) {
                    try {
                        if (typeof repl.editor.setCode === 'function') repl.editor.setCode(code);
                        if (typeof repl.editor.evaluate === 'function') repl.editor.evaluate();
                    } catch(e) {
                        console.error("Evaluation error:", e);
                    }
                }
            }
        });
    </script>
</body>
</html>
